<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Lirio Infinito</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: Georgia, serif;
    }

    .scene {
      background: #000;
      width: 100%;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      padding: 40px 0 50px;
    }

    .stars { position: absolute; inset: 0; pointer-events: none; }
    .star {
      position: absolute;
      background: #fff;
      border-radius: 50%;
      animation: twinkle var(--d, 3s) ease-in-out infinite var(--delay, 0s);
      opacity: 0;
    }
    @keyframes twinkle {
      0%, 100% { opacity: 0; }
      50% { opacity: var(--op, 0.8); }
    }

    .vitrina-wrap {
      position: relative;
      width: 240px;
      height: 360px;
    }

    .vitrina-svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1;
    }

    .lily-inside {
      position: absolute;
      bottom: 42px;
      left: 50%;
      transform: translateX(-50%);
      width: 160px;
      height: 200px;
      z-index: 2;
    }

    .lily-svg {
      width: 100%;
      height: 100%;
      overflow: visible;
    }

    .poem-box {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      bottom: calc(100% + 14px);
      background: rgba(8, 3, 18, 0.97);
      border: 1px solid rgba(200, 150, 255, 0.35);
      border-radius: 12px;
      padding: 14px 18px;
      width: 230px;
      text-align: center;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s;
      z-index: 30;
    }
    .poem-box.show { opacity: 1; }
    .poem-title {
      font-size: 10px;
      color: rgba(200, 150, 255, 0.65);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 7px;
      font-family: Arial, sans-serif;
    }
    .poem-text {
      font-size: 13px;
      color: #f0e6ff;
      line-height: 1.75;
      font-style: italic;
      font-family: Georgia, serif;
    }

    .stem {
      stroke: #2d6a2d;
      stroke-width: 2.5;
      stroke-linecap: round;
      fill: none;
      stroke-dasharray: 180;
      stroke-dashoffset: 180;
      animation: growStem 3s ease-out infinite;
    }
    @keyframes growStem {
      0% { stroke-dashoffset: 180; }
      40%, 80% { stroke-dashoffset: 0; }
      100% { stroke-dashoffset: 0; }
    }

    .leaf {
      fill: #2d7a2d;
      animation: leafAppear 3s ease-out infinite;
    }
    @keyframes leafAppear {
      0%, 25% { opacity: 0; }
      50%, 80% { opacity: 1; }
      100% { opacity: 0; }
    }

.petal-group {
  animation: spin 12s linear infinite;
  transform-origin: 80px 118px;
}

@keyframes bloom {
  from { transform: scale(0); opacity: 0; }
  to   { transform: scale(1); opacity: 1; }
}

@keyframes spin {
  from { transform: rotate(0deg); }
  to   { transform: rotate(360deg); }
}
    .lily-center {
      animation: pulse 2s ease-in-out infinite;
      transform-origin: 80px 118px;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(0.93); }
      50% { transform: scale(1.07); }
    }

/* Giro lento de toda la flor */
.petal-group {
  animation: spin 12s linear infinite;
  transform-origin: 80px 118px;
}

/* Animación de giro */
@keyframes spin {
  from { transform: rotate(0deg); }
  to   { transform: rotate(360deg); }
}

/* Respiración de los pétalos */
.petal ellipse {
  animation: breathe 3s ease-in-out infinite;
  transform-origin: center;
}

/* Animación respirar */
@keyframes breathe {
  0%, 100% {
    transform: scale(1);
  }
  50% {
    transform: scale(1.08);
  }
}

/* Cada pétalo respira diferente (más realista) */
.petal:nth-child(1) ellipse { animation-delay: 0s; }
.petal:nth-child(2) ellipse { animation-delay: 0.3s; }
.petal:nth-child(3) ellipse { animation-delay: 0.6s; }
.petal:nth-child(4) ellipse { animation-delay: 0.9s; }
.petal:nth-child(5) ellipse { animation-delay: 1.2s; }
.petal:nth-child(6) ellipse { animation-delay: 1.5s; }

    .click-hint {
      margin-top: 20px;
      font-size: 11px;
      color: rgba(200, 150, 255, 0.45);
      letter-spacing: 1.5px;
      font-family: Arial, sans-serif;
      text-align: center;
      animation: fadeHint 3s ease-in-out infinite;
    }
    @keyframes fadeHint {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 0.9; }
    }
  </style>
</head>
<body>

<div class="scene">
  <div class="stars" id="stars"></div>

  <div class="vitrina-wrap">

    <div class="poem-box" id="poemBox">
      <div class="poem-title" id="poemTitle">Pétalo</div>
      <div class="poem-text" id="poemText"></div>
    </div>

    <div class="lily-inside">
      <svg class="lily-svg" viewBox="0 0 160 200" xmlns="http://www.w3.org/2000/svg">
        <line class="stem" x1="80" y1="198" x2="80" y2="118"/>
        <path class="leaf" d="M80,168 Q58,148 48,132 Q67,145 80,160 Z"/>

        <g class="petal-group">
          <g class="petal" data-idx="0" transform="rotate(0,80,118)">
            <ellipse cx="80" cy="93" rx="12" ry="29" fill="#d4a0e0" opacity="0.9"/>
          </g>
          <g class="petal" data-idx="1" transform="rotate(60,80,118)">
            <ellipse cx="80" cy="93" rx="12" ry="29" fill="#c87dd4" opacity="0.87"/>
          </g>
          <g class="petal" data-idx="2" transform="rotate(120,80,118)">
            <ellipse cx="80" cy="93" rx="12" ry="29" fill="#b868c8" opacity="0.87"/>
          </g>
          <g class="petal" data-idx="3" transform="rotate(180,80,118)">
            <ellipse cx="80" cy="93" rx="12" ry="29" fill="#cc8de0" opacity="0.9"/>
          </g>
          <g class="petal" data-idx="4" transform="rotate(240,80,118)">
            <ellipse cx="80" cy="93" rx="12" ry="29" fill="#bf7ad8" opacity="0.87"/>
          </g>
          <g class="petal" data-idx="5" transform="rotate(300,80,118)">
            <ellipse cx="80" cy="93" rx="12" ry="29" fill="#d4a0e0" opacity="0.9"/>
          </g>
        </g>

        <g class="lily-center">
          <circle cx="80" cy="118" r="10" fill="#f5e050"/>
          <circle cx="80" cy="118" r="6" fill="#e8c820"/>
          <line x1="80" y1="112" x2="78" y2="105" stroke="#b89000" stroke-width="1.2" stroke-linecap="round"/>
          <line x1="80" y1="112" x2="83" y2="105" stroke="#b89000" stroke-width="1.2" stroke-linecap="round"/>
          <line x1="80" y1="112" x2="80" y2="104" stroke="#b89000" stroke-width="1.2" stroke-linecap="round"/>
          <circle cx="78" cy="104" r="1.8" fill="#b89000"/>
          <circle cx="83" cy="104" r="1.8" fill="#b89000"/>
          <circle cx="80" cy="103" r="1.8" fill="#b89000"/>
        </g>
      </svg>
    </div>

    <svg class="vitrina-svg" viewBox="0 0 240 360" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="baseGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#3a2a4a"/>
          <stop offset="100%" stop-color="#1a1020"/>
        </linearGradient>
        <linearGradient id="baseTopGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#4a3a5a"/>
          <stop offset="100%" stop-color="#2a1a3a"/>
        </linearGradient>
        <linearGradient id="glassGrad" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%" stop-color="rgba(180,140,255,0.07)"/>
          <stop offset="40%" stop-color="rgba(220,200,255,0.03)"/>
          <stop offset="100%" stop-color="rgba(160,120,220,0.08)"/>
        </linearGradient>
      </defs>

      <ellipse cx="120" cy="346" rx="88" ry="10" fill="rgba(0,0,0,0.5)"/>
      <rect x="44" y="310" width="152" height="30" rx="4" fill="url(#baseGrad)" stroke="rgba(120,80,180,0.4)" stroke-width="1"/>
      <ellipse cx="120" cy="310" rx="76" ry="9" fill="url(#baseTopGrad)" stroke="rgba(150,100,220,0.5)" stroke-width="1"/>
      <rect x="52" y="320" width="136" height="1" fill="rgba(180,130,255,0.2)"/>
      <rect x="52" y="330" width="136" height="1" fill="rgba(180,130,255,0.15)"/>

      <path d="M46,308 Q46,60 120,40 Q194,60 194,308 Z" fill="url(#glassGrad)" stroke="rgba(180,130,255,0.22)" stroke-width="1.2"/>

      <ellipse cx="120" cy="42" rx="18" ry="7" fill="rgba(160,120,220,0.25)" stroke="rgba(180,140,255,0.4)" stroke-width="1"/>
      <ellipse cx="120" cy="40" rx="8" ry="4" fill="rgba(200,160,255,0.35)" stroke="rgba(220,180,255,0.5)" stroke-width="0.8"/>
      <ellipse cx="120" cy="37" rx="5" ry="3" fill="rgba(180,140,240,0.5)" stroke="rgba(220,190,255,0.6)" stroke-width="0.8"/>

      <path d="M60,280 Q58,130 85,68" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="3" stroke-linecap="round"/>
      <path d="M175,240 Q180,160 168,100" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="2" stroke-linecap="round"/>

      <ellipse cx="120" cy="308" rx="74" ry="8" fill="none" stroke="rgba(160,110,220,0.35)" stroke-width="1"/>
    </svg>

  </div>

  <div class="click-hint">✦ toca cada pétalo ✦</div>
</div>

<script>
  // ── Cambia aquí los poemas de cada pétalo ──
  const poems = [
    {
      title: "Pétalo I",
      text: "En tus ojos vive\nel cielo que no he visto.\nMe pierdo en ellos."
    },
    {
      title: "Pétalo II",
      text: "Tu voz es el viento\nque dobla mi corazón\nhacia donde estás."
    },
    {
      title: "Pétalo III",
      text: "Te busco en el alba,\nte encuentro en cada silencio.\nEres mi mañana."
    },
    {
      title: "Pétalo IV",
      text: "Mi alma te reconoce\ncomo el mar reconoce\nla orilla que espera."
    },
    {
      title: "Pétalo V",
      text: "Eres el poema\nque no sé cómo escribir,\npero lo siento."
    },
    {
      title: "Pétalo VI",
      text: "Sin ti el tiempo es\nun jardín sin primavera.\nContigo, florece."
    }
  ];

  // Estrellas
  const starsEl = document.getElementById('stars');
  for (let i = 0; i < 60; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = Math.random() * 2 + 0.8;
    s.style.cssText = `
      width:${size}px; height:${size}px;
      left:${Math.random() * 100}%;
      top:${Math.random() * 100}%;
      --d:${(Math.random() * 3 + 2).toFixed(1)}s;
      --delay:${(Math.random() * 5).toFixed(1)}s;
      --op:${(Math.random() * 0.5 + 0.3).toFixed(2)};
    `;
    starsEl.appendChild(s);
  }

  // Pétalos
  const poemBox   = document.getElementById('poemBox');
  const poemTitle = document.getElementById('poemTitle');
  const poemText  = document.getElementById('poemText');
  let currentPetal = null;

  document.querySelectorAll('.petal').forEach(petal => {
    petal.addEventListener('click', e => {
      e.stopPropagation();
      const idx = parseInt(petal.dataset.idx);
      const poem = poems[idx];
      if (currentPetal) currentPetal.classList.remove('active');
      if (currentPetal === petal && poemBox.classList.contains('show')) {
        poemBox.classList.remove('show');
        currentPetal = null;
        return;
      }
      currentPetal = petal;
      petal.classList.add('active');
      poemTitle.textContent = poem.title;
      poemText.innerHTML = poem.text.split('\n').join('<br>');
      poemBox.classList.add('show');
    });
  });

  document.querySelector('.scene').addEventListener('click', () => {
    poemBox.classList.remove('show');
    if (currentPetal) {
      currentPetal.classList.remove('active');
      currentPetal = null;
    }
  });
</script>

</body>
</html>
